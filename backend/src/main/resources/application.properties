# ===============================
# DreamStay Backend Configuration
# ===============================

server.port=8080

# ---- Database (MySQL) ----
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/dreamstay_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Vaishu@712001
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

# ---- SQL init (sample data) ----
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# ---- JWT ----
# 256-bit+ secret used to sign tokens - change this in production!
dreamstay.app.jwtSecret=DreamStayHotelBookingSuperSecretKeyForJwtSigning2024ChangeMeInProd
dreamstay.app.jwtExpirationMs=86400000

# ---- CORS ----
dreamstay.app.corsAllowedOrigins=http://localhost:4200

# ---- Logging ----
logging.level.org.springframework.security=INFO
logging.level.com.dreamstay=DEBUG
