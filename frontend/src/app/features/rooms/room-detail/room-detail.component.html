<div *ngIf="loading" class="py-24 text-center text-gray-500">Loading room details...</div>
<div *ngIf="errorMessage" class="mx-auto max-w-3xl px-4 py-24 text-center text-red-600">{{ errorMessage }}</div>

<section *ngIf="room && !loading" class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
  <a routerLink="/rooms" class="text-sm font-medium text-primary-700 hover:underline">&larr; Back to all rooms</a>

  <div class="mt-4 grid grid-cols-1 gap-10 lg:grid-cols-3">
    <div class="lg:col-span-2">
      <div class="relative h-80 w-full overflow-hidden rounded-xl sm:h-96">
        <img [src]="room.imageUrl" [alt]="room.type" class="h-full w-full object-cover"/>
        <span class="absolute left-4 top-4 badge bg-white/90 text-primary-800">{{ room.type }}</span>
      </div>

      <div class="mt-6 flex items-center justify-between">
        <h1 class="font-display text-3xl font-bold text-gray-900">Room {{ room.roomNumber }}</h1>
        <div class="flex items-center gap-1 text-sm text-gray-500">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-1.13a4 4 0 10-4-4 4 4 0 004 4z"/></svg>
          Up to {{ room.capacity }} guests
        </div>
      </div>

      <p class="mt-4 leading-relaxed text-gray-600">{{ room.description }}</p>

      <div *ngIf="room.amenities && room.amenities.length" class="mt-6">
        <h3 class="font-semibold text-gray-900">Amenities</h3>
        <div class="mt-3 flex flex-wrap gap-2">
          <span *ngFor="let amenity of room.amenities" class="badge bg-gray-100 text-gray-700">{{ amenity }}</span>
        </div>
      </div>
    </div>

    <div>
      <app-booking-form [room]="room"></app-booking-form>
    </div>
  </div>
</section>
