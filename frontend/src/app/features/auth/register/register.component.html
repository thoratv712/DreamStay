<div class="flex min-h-[80vh] items-center justify-center bg-gray-50 px-4 py-12">
  <div class="w-full max-w-md">
    <div class="card p-8">
      <div class="mb-6 text-center">
        <h1 class="font-display text-2xl font-bold text-gray-900">Create Your Account</h1>
        <p class="mt-1 text-sm text-gray-500">Join DreamStay and start booking</p>
      </div>

      <div *ngIf="errorMessage" class="mb-4 rounded-lg bg-red-50 px-4 py-3 text-sm text-red-700">
        {{ errorMessage }}
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="mb-1 block text-sm font-medium text-gray-700">Full Name</label>
          <input type="text" formControlName="fullName" class="input-field" placeholder="Jane Doe"/>
          <p *ngIf="f['fullName'].touched && f['fullName'].invalid" class="mt-1 text-xs text-red-600">
            Please enter your full name.
          </p>
        </div>

        <div>
          <label class="mb-1 block text-sm font-medium text-gray-700">Email Address</label>
          <input type="email" formControlName="email" class="input-field" placeholder="you@example.com"/>
          <p *ngIf="f['email'].touched && f['email'].invalid" class="mt-1 text-xs text-red-600">
            Please enter a valid email address.
          </p>
        </div>

        <div>
          <label class="mb-1 block text-sm font-medium text-gray-700">Phone Number <span class="text-gray-400">(optional)</span></label>
          <input type="tel" formControlName="phone" class="input-field" placeholder="+1 555 123 4567"/>
        </div>

        <div>
          <label class="mb-1 block text-sm font-medium text-gray-700">Password</label>
          <input type="password" formControlName="password" class="input-field" placeholder="At least 6 characters"/>
          <p *ngIf="f['password'].touched && f['password'].invalid" class="mt-1 text-xs text-red-600">
            Password must be at least 6 characters.
          </p>
        </div>

        <button type="submit" [disabled]="loading" class="btn-primary w-full">
          {{ loading ? 'Creating account...' : 'Create Account' }}
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-gray-500">
        Already have an account?
        <a routerLink="/login" class="font-semibold text-primary-700 hover:underline">Sign in</a>
      </p>
    </div>
  </div>
</div>
